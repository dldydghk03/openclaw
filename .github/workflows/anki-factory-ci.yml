name: Anki Factory CI

on:
  pull_request:
    paths:
      - "tools/anki-factory/**"
      - "docs/anki-factory/**"
      - ".github/copilot-instructions.md"
      - ".github/instructions/anki-factory.instructions.md"
      - ".github/agents/anki-factory-maintainer.agent.md"
      - ".github/skills/anki-factory-quality/**"
      - ".github/hooks/anki-factory-*.json"
      - ".github/hooks/anki-factory-*.sh"
      - ".github/workflows/anki-factory-ci.yml"
  push:
    branches:
      - main
    paths:
      - "tools/anki-factory/**"
      - "docs/anki-factory/**"
      - ".github/copilot-instructions.md"
      - ".github/instructions/anki-factory.instructions.md"
      - ".github/agents/anki-factory-maintainer.agent.md"
      - ".github/skills/anki-factory-quality/**"
      - ".github/hooks/anki-factory-*.json"
      - ".github/hooks/anki-factory-*.sh"
      - ".github/workflows/anki-factory-ci.yml"
  workflow_dispatch:

concurrency:
  group: anki-factory-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  public-fixtures:
    name: Public fixture gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run public Anki Factory smoke
        run: .github/skills/anki-factory-quality/scripts/run-smoke.sh
