name: Anki Factory Pages

on:
  pull_request:
    paths:
      - "tools/anki-factory/**"
      - "docs/anki-factory/**"
      - "docs/anki-factory-dashboard/**"
      - ".devcontainer/devcontainer.json"
      - ".github/copilot-instructions.md"
      - ".github/instructions/anki-factory.instructions.md"
      - ".github/agents/anki-factory-maintainer.agent.md"
      - ".github/ISSUE_TEMPLATE/anki_factory_improvement.yml"
      - ".github/ISSUE_TEMPLATE/deck_quality_regression.yml"
      - ".github/ISSUE_TEMPLATE/workflow_gate_change.yml"
      - ".github/labeler.yml"
      - ".github/pull_request_template.md"
      - ".github/skills/anki-factory-quality/**"
      - ".github/hooks/anki-factory-*.json"
      - ".github/hooks/anki-factory-*.sh"
      - ".github/workflows/anki-factory-ci.yml"
      - ".github/workflows/anki-factory-pages.yml"
  push:
    branches:
      - main
    paths:
      - "tools/anki-factory/**"
      - "docs/anki-factory/**"
      - "docs/anki-factory-dashboard/**"
      - ".devcontainer/devcontainer.json"
      - ".github/copilot-instructions.md"
      - ".github/instructions/anki-factory.instructions.md"
      - ".github/agents/anki-factory-maintainer.agent.md"
      - ".github/ISSUE_TEMPLATE/anki_factory_improvement.yml"
      - ".github/ISSUE_TEMPLATE/deck_quality_regression.yml"
      - ".github/ISSUE_TEMPLATE/workflow_gate_change.yml"
      - ".github/labeler.yml"
      - ".github/pull_request_template.md"
      - ".github/skills/anki-factory-quality/**"
      - ".github/hooks/anki-factory-*.json"
      - ".github/hooks/anki-factory-*.sh"
      - ".github/workflows/anki-factory-ci.yml"
      - ".github/workflows/anki-factory-pages.yml"
  workflow_dispatch:

concurrency:
  group: anki-factory-pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build quality dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run public Anki Factory smoke
        run: |
          set -o pipefail
          mkdir -p anki-factory-ci-artifacts
          .github/skills/anki-factory-quality/scripts/run-smoke.sh | tee anki-factory-ci-artifacts/smoke-report.json

      - name: Build static quality dashboard
        env:
          ANKI_FACTORY_REF_NAME: ${{ github.ref_name }}
          ANKI_FACTORY_REPO: ${{ github.repository }}
          ANKI_FACTORY_SHA: ${{ github.sha }}
        run: |
          python3 tools/anki-factory/scripts/build_quality_dashboard.py \
            --smoke-report anki-factory-ci-artifacts/smoke-report.json \
            --out-dir anki-factory-pages \
            --repo "$ANKI_FACTORY_REPO" \
            --ref "$ANKI_FACTORY_REF_NAME" \
            --sha "$ANKI_FACTORY_SHA"

      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anki-factory-quality-dashboard
          path: anki-factory-pages/
          if-no-files-found: error
          retention-days: 14

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: anki-factory-pages/

  deploy:
    name: Deploy quality dashboard
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
